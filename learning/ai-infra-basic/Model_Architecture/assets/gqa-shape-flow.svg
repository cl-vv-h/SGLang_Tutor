<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="650" viewBox="0 0 1280 650" role="img" aria-labelledby="title desc">
  <title id="title">Grouped-query attention tensor shape flow</title>
  <desc id="desc">Hidden states are projected to Q K V, normalized and rotated, combined with KV cache, processed by causal attention, then projected back to hidden size.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.b{stroke:#334155;stroke-width:2;rx:6}.t{font:600 18px Arial,sans-serif;fill:#0f172a}.s{font:15px Consolas,monospace;fill:#334155}.l{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1280" height="650" fill="#f8fafc"/>
  <rect class="b" x="35" y="260" width="150" height="95" fill="#dbeafe"/><text class="t" x="110" y="295" text-anchor="middle">Hidden</text><text class="s" x="110" y="325" text-anchor="middle">X [T,H]</text>
  <rect class="b" x="235" y="245" width="190" height="125" fill="#dcfce7"/><text class="t" x="330" y="280" text-anchor="middle">Fused QKV Linear</text><text class="s" x="330" y="310" text-anchor="middle">[T,Q+2K]</text><text class="s" x="330" y="338" text-anchor="middle">Q=Nq*D, K=Nkv*D</text>
  <rect class="b" x="490" y="65" width="210" height="115" fill="#fef3c7"/><text class="t" x="595" y="100" text-anchor="middle">Q + QK Norm + RoPE</text><text class="s" x="595" y="132" text-anchor="middle">[T,Nq,D]</text>
  <rect class="b" x="490" y="265" width="210" height="115" fill="#fef3c7"/><text class="t" x="595" y="300" text-anchor="middle">K + QK Norm + RoPE</text><text class="s" x="595" y="332" text-anchor="middle">[T,Nkv,D]</text>
  <rect class="b" x="490" y="465" width="210" height="115" fill="#fef3c7"/><text class="t" x="595" y="500" text-anchor="middle">V</text><text class="s" x="595" y="532" text-anchor="middle">[T,Nkv,D]</text>
  <rect class="b" x="765" y="250" width="205" height="145" fill="#fee2e2"/><text class="t" x="867" y="285" text-anchor="middle">Paged KV Cache</text><text class="s" x="867" y="318" text-anchor="middle">K_hist [L,Nkv,D]</text><text class="s" x="867" y="348" text-anchor="middle">V_hist [L,Nkv,D]</text><text class="s" x="867" y="378" text-anchor="middle">append current K,V</text>
  <rect class="b" x="1025" y="180" width="220" height="210" fill="#e0e7ff"/><text class="t" x="1135" y="218" text-anchor="middle">Causal GQA Kernel</text><text class="s" x="1135" y="252" text-anchor="middle">group = Nq / Nkv</text><text class="s" x="1135" y="282" text-anchor="middle">score: [Nq,Lq,Lkv]</text><text class="s" x="1135" y="312" text-anchor="middle">conceptual only</text><text class="s" x="1135" y="352" text-anchor="middle">O [T,Nq,D]</text>
  <rect class="b" x="1025" y="475" width="220" height="105" fill="#dcfce7"/><text class="t" x="1135" y="510" text-anchor="middle">Output Linear</text><text class="s" x="1135" y="542" text-anchor="middle">[T,Nq*D] -&gt; [T,H]</text>
  <path class="l" d="M185 307 H225"/><path class="l" d="M425 307 C455 307 455 122 480 122"/><path class="l" d="M425 307 H480"/><path class="l" d="M425 307 C455 307 455 522 480 522"/>
  <path class="l" d="M700 322 H755"/><path class="l" d="M700 522 C735 522 735 360 755 360"/><path class="l" d="M970 322 H1015"/><path class="l" d="M700 122 C900 122 930 225 1015 225"/><path class="l" d="M1135 390 V465"/>
</svg>
