<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">SGLang Qwen3-MoE forward call and data dependency chain</title>
  <desc id="desc">The causal language model calls the model, loops through decoder layers, runs attention and MoE, then final normalization, logits processing and sampling.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.b{stroke:#334155;stroke-width:2;rx:6}.t{font:600 18px Arial,sans-serif;fill:#0f172a}.s{font:14px Consolas,monospace;fill:#334155}.l{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1320" height="760" fill="#f8fafc"/>
  <rect class="b" x="35" y="55" width="250" height="100" fill="#dbeafe"/><text class="t" x="160" y="90" text-anchor="middle">Qwen3MoeForCausalLM</text><text class="s" x="160" y="122" text-anchor="middle">input_ids [T], positions [T]</text>
  <rect class="b" x="350" y="55" width="250" height="100" fill="#dcfce7"/><text class="t" x="475" y="90" text-anchor="middle">Qwen3MoeModel</text><text class="s" x="475" y="122" text-anchor="middle">embedding -&gt; [T,H]</text>
  <rect class="b" x="665" y="30" width="300" height="150" fill="#fff7ed"/><text class="t" x="815" y="68" text-anchor="middle">Qwen3MoeDecoderLayer x L</text><text class="s" x="815" y="100" text-anchor="middle">hidden_states [T,H]</text><text class="s" x="815" y="127" text-anchor="middle">residual [T,H] or None</text><text class="s" x="815" y="154" text-anchor="middle">ForwardBatch metadata</text>
  <rect class="b" x="1030" y="55" width="245" height="100" fill="#e0e7ff"/><text class="t" x="1152" y="90" text-anchor="middle">Final RMSNorm</text><text class="s" x="1152" y="122" text-anchor="middle">[T,H]</text>
  <rect class="b" x="120" y="270" width="290" height="170" fill="#fef3c7"/><text class="t" x="265" y="307" text-anchor="middle">Qwen3MoeAttention</text><text class="s" x="265" y="340" text-anchor="middle">qkv_proj -&gt; q,k,v</text><text class="s" x="265" y="368" text-anchor="middle">QK Norm + RoPE</text><text class="s" x="265" y="396" text-anchor="middle">RadixAttention + KV Cache</text><text class="s" x="265" y="424" text-anchor="middle">o_proj -&gt; [T,H]</text>
  <rect class="b" x="515" y="270" width="290" height="170" fill="#fce7f3"/><text class="t" x="660" y="307" text-anchor="middle">Qwen3MoeSparseMoeBlock</text><text class="s" x="660" y="340" text-anchor="middle">gate -&gt; [T,E]</text><text class="s" x="660" y="368" text-anchor="middle">TopK -&gt; [T,K]</text><text class="s" x="660" y="396" text-anchor="middle">dispatch / experts / combine</text><text class="s" x="660" y="424" text-anchor="middle">output -&gt; [T,H]</text>
  <rect class="b" x="910" y="270" width="290" height="170" fill="#fee2e2"/><text class="t" x="1055" y="307" text-anchor="middle">LayerCommunicator</text><text class="s" x="1055" y="340" text-anchor="middle">RMSNorm + residual</text><text class="s" x="1055" y="368" text-anchor="middle">TP / DP reduction</text><text class="s" x="1055" y="396" text-anchor="middle">reduce-scatter / fusion</text><text class="s" x="1055" y="424" text-anchor="middle">layer boundary state</text>
  <rect class="b" x="250" y="570" width="270" height="110" fill="#e0e7ff"/><text class="t" x="385" y="608" text-anchor="middle">LogitsProcessor + LM Head</text><text class="s" x="385" y="640" text-anchor="middle">[M,H] -&gt; [M,V]</text>
  <rect class="b" x="705" y="570" width="220" height="110" fill="#dcfce7"/><text class="t" x="815" y="608" text-anchor="middle">Sampling</text><text class="s" x="815" y="640" text-anchor="middle">logits -&gt; token ids [B]</text>
  <path class="l" d="M285 105 H340"/><path class="l" d="M600 105 H655"/><path class="l" d="M965 105 H1020"/>
  <path class="l" d="M815 180 C815 225 265 225 265 260"/><path class="l" d="M410 355 H505"/><path class="l" d="M805 355 H900"/><path class="l" d="M1055 270 C1055 220 900 220 900 180"/>
  <path class="l" d="M1152 155 C1152 510 385 510 385 560"/><path class="l" d="M520 625 H695"/>
</svg>
