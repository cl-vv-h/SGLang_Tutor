<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="620" viewBox="0 0 1320 620" role="img" aria-labelledby="title desc">
  <title id="title">Main language model architecture families</title>
  <desc id="desc">A comparison of encoder-only, encoder-decoder, dense decoder, sparse MoE decoder, latent attention MoE, and state-space hybrid model families.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.b{stroke:#334155;stroke-width:2;rx:6}.t{font:600 18px Arial,sans-serif;fill:#0f172a}.s{font:14px Arial,sans-serif;fill:#334155}.l{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1320" height="620" fill="#f8fafc"/>
  <rect class="b" x="490" y="35" width="340" height="95" fill="#dbeafe"/><text class="t" x="660" y="72" text-anchor="middle">Sequence Foundation Models</text><text class="s" x="660" y="102" text-anchor="middle">token mixing + channel transformation</text>
  <rect class="b" x="35" y="220" width="190" height="140" fill="#dcfce7"/><text class="t" x="130" y="255" text-anchor="middle">Encoder-only</text><text class="s" x="130" y="286" text-anchor="middle">bidirectional attention</text><text class="s" x="130" y="312" text-anchor="middle">representation learning</text><text class="s" x="130" y="338" text-anchor="middle">BERT-style</text>
  <rect class="b" x="250" y="220" width="190" height="140" fill="#e0e7ff"/><text class="t" x="345" y="255" text-anchor="middle">Encoder-Decoder</text><text class="s" x="345" y="286" text-anchor="middle">encoder self-attention</text><text class="s" x="345" y="312" text-anchor="middle">decoder cross-attention</text><text class="s" x="345" y="338" text-anchor="middle">T5-style</text>
  <rect class="b" x="465" y="220" width="190" height="140" fill="#fef3c7"/><text class="t" x="560" y="255" text-anchor="middle">Dense Decoder</text><text class="s" x="560" y="286" text-anchor="middle">causal attention</text><text class="s" x="560" y="312" text-anchor="middle">dense SwiGLU FFN</text><text class="s" x="560" y="338" text-anchor="middle">GPT / LLaMA-style</text>
  <rect class="b" x="680" y="220" width="190" height="140" fill="#fce7f3"/><text class="t" x="775" y="255" text-anchor="middle">Sparse MoE Decoder</text><text class="s" x="775" y="286" text-anchor="middle">causal GQA</text><text class="s" x="775" y="312" text-anchor="middle">Top-K routed experts</text><text class="s" x="775" y="338" text-anchor="middle">Mixtral-style</text>
  <rect class="b" x="895" y="220" width="190" height="140" fill="#fee2e2"/><text class="t" x="990" y="255" text-anchor="middle">Latent Attn + MoE</text><text class="s" x="990" y="286" text-anchor="middle">compressed KV state</text><text class="s" x="990" y="312" text-anchor="middle">fine-grained experts</text><text class="s" x="990" y="338" text-anchor="middle">DeepSeek-style</text>
  <rect class="b" x="1110" y="220" width="175" height="140" fill="#fff7ed"/><text class="t" x="1197" y="255" text-anchor="middle">SSM Hybrid</text><text class="s" x="1197" y="286" text-anchor="middle">state-space layers</text><text class="s" x="1197" y="312" text-anchor="middle">optional attention</text><text class="s" x="1197" y="338" text-anchor="middle">Mamba-style</text>
  <path class="l" d="M660 130 C660 175 130 175 130 210"/><path class="l" d="M660 130 C660 175 345 175 345 210"/><path class="l" d="M660 130 V210"/><path class="l" d="M660 130 C660 175 775 175 775 210"/><path class="l" d="M660 130 C660 175 990 175 990 210"/><path class="l" d="M660 130 C660 175 1197 175 1197 210"/>
  <text class="s" x="660" y="430" text-anchor="middle">Attention choice determines token interaction and cache state.</text>
  <text class="s" x="660" y="465" text-anchor="middle">FFN or MoE choice determines parameter activation and routing.</text>
  <text class="s" x="660" y="500" text-anchor="middle">Normalization, position encoding, residual layout, and modality adapters define further variants.</text>
</svg>
