<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="670" viewBox="0 0 1280 670" role="img" aria-labelledby="title desc">
  <title id="title">Sparse mixture-of-experts routing and combination</title>
  <desc id="desc">Tokens are scored by a router, top K experts are selected, token copies are dispatched to experts, processed by SwiGLU networks, and combined by routing weights.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.b{stroke:#334155;stroke-width:2;rx:6}.t{font:600 18px Arial,sans-serif;fill:#0f172a}.s{font:15px Consolas,monospace;fill:#334155}.l{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1280" height="670" fill="#f8fafc"/>
  <rect class="b" x="30" y="275" width="140" height="100" fill="#dbeafe"/><text class="t" x="100" y="310" text-anchor="middle">Tokens</text><text class="s" x="100" y="342" text-anchor="middle">X [T,H]</text>
  <rect class="b" x="220" y="115" width="190" height="115" fill="#dcfce7"/><text class="t" x="315" y="150" text-anchor="middle">Router Linear</text><text class="s" x="315" y="182" text-anchor="middle">G = X Wr</text><text class="s" x="315" y="207" text-anchor="middle">[T,E]</text>
  <rect class="b" x="220" y="420" width="190" height="115" fill="#fef3c7"/><text class="t" x="315" y="455" text-anchor="middle">Top-K Select</text><text class="s" x="315" y="487" text-anchor="middle">ids, weights</text><text class="s" x="315" y="512" text-anchor="middle">[T,K], [T,K]</text>
  <rect class="b" x="470" y="255" width="180" height="140" fill="#fee2e2"/><text class="t" x="560" y="292" text-anchor="middle">Dispatch</text><text class="s" x="560" y="325" text-anchor="middle">duplicate + sort</text><text class="s" x="560" y="352" text-anchor="middle">R = T*K routes</text><text class="s" x="560" y="377" text-anchor="middle">[R,H]</text>
  <rect class="b" x="715" y="35" width="230" height="120" fill="#fce7f3"/><text class="t" x="830" y="72" text-anchor="middle">Expert 0 SwiGLU</text><text class="s" x="830" y="103" text-anchor="middle">[r0,H]-&gt;[r0,Ie]-&gt;[r0,H]</text>
  <rect class="b" x="715" y="190" width="230" height="120" fill="#fce7f3"/><text class="t" x="830" y="227" text-anchor="middle">Expert 1 SwiGLU</text><text class="s" x="830" y="258" text-anchor="middle">[r1,H]-&gt;[r1,Ie]-&gt;[r1,H]</text>
  <rect class="b" x="715" y="345" width="230" height="120" fill="#fce7f3"/><text class="t" x="830" y="382" text-anchor="middle">...</text><text class="s" x="830" y="413" text-anchor="middle">sum(re) = R</text>
  <rect class="b" x="715" y="500" width="230" height="120" fill="#fce7f3"/><text class="t" x="830" y="537" text-anchor="middle">Expert E-1 SwiGLU</text><text class="s" x="830" y="568" text-anchor="middle">[re,H]-&gt;[re,Ie]-&gt;[re,H]</text>
  <rect class="b" x="1010" y="255" width="155" height="140" fill="#e0e7ff"/><text class="t" x="1087" y="292" text-anchor="middle">Combine</text><text class="s" x="1087" y="325" text-anchor="middle">weighted sum</text><text class="s" x="1087" y="352" text-anchor="middle">over K routes</text><text class="s" x="1087" y="377" text-anchor="middle">Y [T,H]</text>
  <rect class="b" x="1200" y="275" width="60" height="100" fill="#dbeafe"/><text class="t" x="1230" y="316" text-anchor="middle">Y</text><text class="s" x="1230" y="345" text-anchor="middle">[T,H]</text>
  <path class="l" d="M170 325 C195 325 195 172 210 172"/><path class="l" d="M315 230 V410"/><path class="l" d="M170 325 H460"/><path class="l" d="M410 477 C450 477 440 370 460 370"/>
  <path class="l" d="M650 325 C680 325 680 95 705 95"/><path class="l" d="M650 325 C680 325 680 250 705 250"/><path class="l" d="M650 325 C680 325 680 405 705 405"/><path class="l" d="M650 325 C680 325 680 560 705 560"/>
  <path class="l" d="M945 95 C980 95 980 290 1000 290"/><path class="l" d="M945 250 C980 250 980 310 1000 310"/><path class="l" d="M945 405 C980 405 980 340 1000 340"/><path class="l" d="M945 560 C980 560 980 360 1000 360"/><path class="l" d="M1165 325 H1190"/>
</svg>
