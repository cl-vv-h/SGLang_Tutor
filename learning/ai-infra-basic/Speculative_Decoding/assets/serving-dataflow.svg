<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Serving dataflow for speculative decoding</title>
  <desc id="desc">Dataflow among scheduler, draft worker, target worker, accept kernel, KV pools, output processor, and next draft state.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #344054; stroke-width: 2; rx: 8; }
      .sched { fill: #f8fafc; stroke: #475467; }
      .draft { fill: #eef6ff; stroke: #1d5f99; }
      .target { fill: #fff4e8; stroke: #b95d13; }
      .accept { fill: #ecfdf3; stroke: #11804b; }
      .kv { fill: #fef3f2; stroke: #b42318; }
      .out { fill: #f4f3ff; stroke: #5925dc; }
      .text { font-family: Arial, sans-serif; fill: #182230; font-size: 18px; }
      .small { font-family: Arial, sans-serif; fill: #475467; font-size: 14px; }
      .mono { font-family: Consolas, monospace; fill: #344054; font-size: 14px; }
      .arrow { stroke: #344054; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect x="20" y="25" width="1160" height="630" fill="#ffffff" stroke="#d0d5dd"/>
  <text x="50" y="65" class="text" font-weight="700">Speculative decoding in an online serving engine</text>
  <text x="50" y="92" class="small">Only target-verified tokens become formal request state. Draft and temporary verify state must be reconciled every round.</text>

  <rect x="60" y="145" width="185" height="120" class="box sched"/>
  <text x="93" y="178" class="text" font-weight="700">Scheduler</text>
  <text x="82" y="207" class="mono">decode batch</text>
  <text x="82" y="229" class="mono">seq_lens</text>
  <text x="82" y="251" class="mono">sampling params</text>

  <rect x="310" y="90" width="210" height="125" class="box draft"/>
  <text x="357" y="123" class="text" font-weight="700">Draft worker</text>
  <text x="335" y="152" class="mono">draft_tokens</text>
  <text x="335" y="174" class="mono">draft_probs</text>
  <text x="335" y="196" class="mono">tree metadata</text>

  <rect x="310" y="275" width="210" height="115" class="box target"/>
  <text x="356" y="308" class="text" font-weight="700">Target worker</text>
  <text x="335" y="337" class="mono">TARGET_VERIFY</text>
  <text x="335" y="359" class="mono">logits / hidden</text>
  <text x="335" y="381" class="mono">temporary KV</text>

  <rect x="585" y="190" width="210" height="125" class="box accept"/>
  <text x="634" y="223" class="text" font-weight="700">Accept kernel</text>
  <text x="610" y="252" class="mono">p_i, q_i</text>
  <text x="610" y="274" class="mono">accept_len</text>
  <text x="610" y="296" class="mono">correction / bonus</text>

  <rect x="850" y="105" width="220" height="130" class="box kv"/>
  <text x="910" y="138" class="text" font-weight="700">KV commit</text>
  <text x="875" y="167" class="mono">select accepted path</text>
  <text x="875" y="189" class="mono">discard rejected KV</text>
  <text x="875" y="211" class="mono">formal target KV</text>

  <rect x="850" y="300" width="220" height="130" class="box out"/>
  <text x="899" y="333" class="text" font-weight="700">Output processor</text>
  <text x="875" y="362" class="mono">append output_ids</text>
  <text x="875" y="384" class="mono">logprob / grammar</text>
  <text x="875" y="406" class="mono">stop / stream</text>

  <rect x="585" y="470" width="220" height="105" class="box draft"/>
  <text x="625" y="503" class="text" font-weight="700">Next draft state</text>
  <text x="610" y="532" class="mono">draft KV / hidden</text>
  <text x="610" y="554" class="mono">ngram trie / future map</text>

  <path d="M245 190 C275 160 285 150 310 150" class="arrow"/>
  <path d="M520 152 C555 162 560 202 585 232" class="arrow"/>
  <path d="M520 335 C555 315 560 285 585 265" class="arrow"/>
  <path d="M795 242 C830 210 835 180 850 170" class="arrow"/>
  <path d="M795 280 C830 305 835 340 850 365" class="arrow"/>
  <path d="M960 430 C940 540 825 530 805 525" class="arrow"/>
  <path d="M585 525 C345 560 150 420 150 265" class="arrow dashed"/>

  <text x="75" y="470" class="mono">State invariant:</text>
  <text x="75" y="498" class="mono">output_ids == seq_len == formal target KV prefix</text>
  <text x="75" y="526" class="mono">Rejected draft tokens can never become visible history.</text>
</svg>
